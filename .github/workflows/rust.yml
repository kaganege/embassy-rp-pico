name: Rust

on: [push, pull_request]

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - uses: actions/checkout@v4

          - name: Install Rust Toolchain
            uses: dtolnay/rust-toolchain@v1
            with:
              toolchain: stable
              targets: thumbv6m-none-eabi
          
          - name: Build
            run: cargo build --verbose
